name: campus_saga
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2

  # Image handling
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  cloudinary_flutter: ^1.3.0
  http: ^1.6.0

  # Auth
  google_sign_in: ^7.2.0

  # State management
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1

  # Functional / utilities
  dartz: ^0.10.1
  equatable: ^2.0.8
  uuid: ^4.5.3
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.4
  easy_url_launcher: ^0.0.7
  searchfield: ^2.0.0
  timeago: ^3.7.1

  # UI / theming
  google_fonts: ^8.0.2
  flex_color_scheme: ^8.4.0
  json_theme_plus: ^6.8.1
  iconsax: ^0.0.8
  lottie: ^3.3.2
  toastification: ^3.0.3
  advanced_salomon_bottom_bar: ^3.3.4

  # Notifications
  flutter_local_notifications: 21.0.0-dev.2
  timezone: ^0.11.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/temp/
    - assets/models/
    - assets/icon/
    - assets/lottie/
    - assets/sounds/
